<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FieldBook — Celia Sherriff</title>
  <style>
    :root {
      --green: #2d5016;
      --text: #1a1a1a;
      --muted: #555;
      --bg: #faf9f6;
      --card: #fff;
      --border: #e8e4dc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }
    .wrap {
      max-width: 36rem;
      margin: 0 auto;
      padding: 3rem 1.25rem 4rem;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      color: var(--green);
      margin: 0 0 0.25rem;
    }
    .sub {
      color: var(--muted);
      margin: 0 0 2rem;
      font-size: 1.05rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    a.card {
      display: block;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      color: var(--green);
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
    }
    a.card:hover { border-color: var(--green); }
    footer {
      margin-top: 2.5rem;
      font-size: 0.9rem;
      color: var(--muted);
    }
    footer a { color: var(--green); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>FieldBook</h1>
    <p class="sub">Celia Sherriff</p>
    <div class="links">
      <a class="card" href="privacy/">Privacy Policy</a>
      <a class="card" href="terms/">Terms of Service</a>
    </div>
    <footer>
      <a href="mailto:sherriffcelia@gmail.com">sherriffcelia@gmail.com</a>
    </footer>
  </div>
</body>
</html>
